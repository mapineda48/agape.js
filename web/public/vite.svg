<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <defs>
    <linearGradient id="mainGradient" x1="0" y1="0" x2="300" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1" /> <!-- Indigo 500 -->
      <stop offset="50%" stop-color="#8B5CF6" /> <!-- Violet 500 -->
      <stop offset="100%" stop-color="#EC4899" /> <!-- Pink 500 -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Main Logo Group -->
  <g transform="translate(150,150)">
    <!-- Scale and Position adjustment -->
    <g transform="translate(-100, -100)">
        <!-- Stylized 'A' shape / Arrow -->
        <!-- Left Leg -->
        <path d="M 100 20 L 40 180 A 10 10 0 0 0 50 195 L 75 195 A 10 10 0 0 0 84 185 L 100 140" 
              fill="url(#mainGradient)" 
              stroke="white" 
              stroke-width="2"
              opacity="0.9"/>
              
        <!-- Right Leg -->
        <path d="M 100 20 L 160 180 A 10 10 0 0 1 150 195 L 125 195 A 10 10 0 0 1 116 185 L 100 140" 
              fill="url(#mainGradient)" 
              stroke="white" 
              stroke-width="2"
              opacity="0.9"/>

        <!-- Center Cross / Bridge (Floating) -->
        <path d="M 75 130 L 125 130 L 135 150 L 65 150 Z" 
              fill="#ffffff" 
              fill-opacity="0.2"
              stroke="url(#mainGradient)"
              stroke-width="2"/>
              
        <!-- Top Circle / Head (Symbolizing Human/Agape) -->
        <circle cx="100" cy="50" r="15" fill="white" fill-opacity="0.9" />
    </g>
  </g>
</svg>