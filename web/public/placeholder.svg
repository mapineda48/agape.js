<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <filter id="soft-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15" result="blur"/>
      <feOffset dx="0" dy="10" result="offsetBlur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="offsetBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="600" height="600" fill="url(#bg)"/>
  
  <g transform="translate(300, 280)" filter="url(#soft-shadow)">
    <!-- Abstract Composition suggesting 'content missing' but looking intentional -->
    
    <!-- Floating geometric shapes -->
    <circle cx="0" cy="-20" r="120" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8 8" opacity="0.6">
        <animateTransform attributeName="transform" type="rotate" from="0 0 -20" to="360 0 -20" dur="60s" repeatCount="indefinite" />
    </circle>
    
    <!-- Stylized 'Image' Icon -->
    <g transform="translate(-60, -80) scale(1.2)">
        <path d="M10,90 L90,90 L90,10 L10,10 L10,90 Z" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linejoin="round"/>
        <path d="M10,90 L35,65 L60,90" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linejoin="round"/>
        <path d="M50,90 L70,70 L90,90" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linejoin="round"/>
        <circle cx="65" cy="35" r="8" fill="#cbd5e1" />
    </g>
  </g>

  <text x="300" y="420" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-weight="500" font-size="24" fill="#94a3b8" text-anchor="middle" letter-spacing="2">NO IMAGE</text>
</svg>
