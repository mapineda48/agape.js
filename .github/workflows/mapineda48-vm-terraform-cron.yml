name: Terraform Deploy (DigitalOcean)

on:
  # schedule:
  #    - cron: '0 12 * * *'   # 7:00 AM Colombia (apply) - 12:00 UTC
  #    - cron: '0 0 * * *'    # 7:00 PM Colombia (destroy) - 00:00 UTC
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to perform'
        required: false
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

concurrency:
  group: terraform-deploy
  cancel-in-progress: false

jobs:
  terraform:
    # Solo corre cuando se dispara manualmente
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: .github/actions/deploy  

    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
      TF_CLI_ARGS: -no-color

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Export provider credentials
        run: |
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_SP_CLIENT_ID }}" >> "$GITHUB_ENV"
          echo "ARM_CLIENT_SECRET=${{ secrets.AZURE_SP_CLIENT_SECRET }}" >> "$GITHUB_ENV"
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SP_SUBSCRIPTION_ID }}" >> "$GITHUB_ENV"
          echo "ARM_TENANT_ID=${{ secrets.AZURE_SP_TENANT_ID }}" >> "$GITHUB_ENV"
          echo "CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}" >> "$GITHUB_ENV"
          echo "DIGITALOCEAN_TOKEN=${{ secrets.DIGITALOCEAN_TOKEN }}" >> "$GITHUB_ENV"

      - name: Write .env from secrets
        run: |
          cat > cloud-init/.env <<EOF
          AGAPE_FQDN="${{ secrets.AGAPE_FQDN }}"
          AGAPE_EMAIL_ACME="${{ secrets.AGAPE_EMAIL_ACME }}"
          AGAPE_ADMIN="${{ secrets.AGAPE_ADMIN }}"
          AGAPE_PASSWORD="${{ secrets.AGAPE_PASSWORD }}"
          AGAPE_HOOK="${{ secrets.AGAPE_HOOK }}"
          AGAPE_SECRET="${{ secrets.AGAPE_SECRET }}"
          AGAPE_CDN_HOST="${{ secrets.AGAPE_CDN_HOST }}"

          STORAGE_ACCOUNT_NAME="${{ secrets.STORAGE_ACCOUNT_NAME }}"
          STORAGE_ACCOUNT_KEY="${{ secrets.STORAGE_ACCOUNT_KEY }}"
          STORAGE_CONNECTION_STRING="${{ secrets.STORAGE_CONNECTION_STRING }}"
          STORAGE_DEPLOY_CONTAINER="${{ secrets.STORAGE_DEPLOY_CONTAINER }}"

          NEON_DATABASE_URI="${{ secrets.NEON_DATABASE_URI }}"

          NGROK_AUTHTOKEN="${{ secrets.NGROK_AUTHTOKEN }}"
          NGROK_DEV_DOMAIN="${{ secrets.NGROK_DEV_DOMAIN }}"

          RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}"
          EOF

      - name: Write backend.hcl
        run: |
          cat > backend.hcl <<EOF
          resource_group_name  = "rg-mapineda48-core"
          storage_account_name = "str13b0zxs"
          container_name       = "data-s1nqfulz"
          key                  = "tfstate/agape-deploy.tfstate"
          EOF

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply/Destroy
        run: |
          ACTION="${{ github.event.inputs.action }}"
          echo "Selected action: $ACTION"

          if [[ "$ACTION" == "apply" ]]; then
            terraform apply -auto-approve tfplan
            exit 0
          fi

          if [[ "$ACTION" == "destroy" ]]; then
            terraform destroy -auto-approve
            exit 0
          fi

          echo "Plan only (no changes applied)."
