name: Build and publish docker agape.js

on:
  push:
    branches:
      - develop  # ✅ Unicamente crea la imagen en esta rama
    paths-ignore:
      - '.azure/**'  # 👈 ignora cualquier cambio dentro de la carpeta .deploy

jobs:
  build:
    runs-on: ubuntu-latest 
    permissions: 
      contents: read
      packages: write 
    steps:
      - name: Checks-out your repository
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build -t mapineda48/agape.js:develop .
          docker push mapineda48/agape.js:develop