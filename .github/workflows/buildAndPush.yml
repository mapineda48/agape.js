name: Build and publish docker msgpack-vite-agape-app

on:
  push:
    branches:
      - mspack-vite-agape-app  # ✅ corregido, no se usa "branches:" dentro de "branches:"

jobs:
  build:
    runs-on: ubuntu-latest 
    permissions: 
      contents: read
      packages: write 
    steps:
      - name: Checks-out your repository
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build -t mapineda48/msgpack-vite-agape-app:latest .
          docker push mapineda48/msgpack-vite-agape-app:latest
