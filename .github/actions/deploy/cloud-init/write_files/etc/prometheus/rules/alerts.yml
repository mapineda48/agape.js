# Prometheus Alerting Rules
# Basic alerts for system and container monitoring

groups:
  - name: system-alerts
    interval: 30s
    rules:
      # High CPU usage alert
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected on {{ $labels.instance }}"
          description: "CPU usage is above 80% for more than 5 minutes. Current value: {{ $value | printf \"%.2f\" }}%"

      # High memory usage alert
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected on {{ $labels.instance }}"
          description: "Memory usage is above 85% for more than 5 minutes. Current value: {{ $value | printf \"%.2f\" }}%"

      # Disk space running low
      - alert: DiskSpaceLow
        expr: (1 - (node_filesystem_avail_bytes{fstype=~"ext4|xfs"} / node_filesystem_size_bytes{fstype=~"ext4|xfs"})) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on {{ $labels.instance }}:{{ $labels.mountpoint }}"
          description: "Disk usage is above 85%. Current value: {{ $value | printf \"%.2f\" }}%"

      # System is down (node exporter not responding)
      - alert: SystemDown
        expr: up{job="node"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "System {{ $labels.instance }} is down"
          description: "Node exporter is not responding for more than 1 minute"

  - name: container-alerts
    interval: 30s
    rules:
      # Container is down
      - alert: ContainerDown
        expr: absent(container_last_seen{name=~".+"}) == 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.name }} is down"
          description: "Container has not been seen for 2 minutes"

      # Container high CPU usage
      - alert: ContainerHighCPU
        expr: sum(rate(container_cpu_usage_seconds_total{name=~".+"}[5m])) by (name) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} has high CPU usage"
          description: "Container CPU usage is above 80%. Current: {{ $value | printf \"%.2f\" }}%"

      # Container high memory usage
      - alert: ContainerHighMemory
        expr: (container_memory_usage_bytes{name=~".+"} / container_spec_memory_limit_bytes{name=~".+"}) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} has high memory usage"
          description: "Container memory usage is above 85%. Current: {{ $value | printf \"%.2f\" }}%"

      # Container restarting too frequently
      - alert: ContainerRestartingFrequently
        expr: increase(container_restart_count{name=~".+"}[30m]) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} is restarting frequently"
          description: "Container has restarted {{ $value }} times in the last 30 minutes"

  - name: logging-alerts
    interval: 30s
    rules:
      # Loki is down
      - alert: LokiDown
        expr: up{job="loki"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Loki is down on {{ $labels.instance }}"
          description: "Loki log aggregator is not responding"

      # High log ingestion rate
      - alert: HighLogIngestionRate
        expr: sum(rate(loki_distributor_bytes_received_total[5m])) > 10000000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High log ingestion rate"
          description: "Log ingestion rate is above 10MB/s. This may indicate log spam."
