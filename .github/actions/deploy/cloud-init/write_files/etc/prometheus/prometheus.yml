# Prometheus Configuration - Optimized for Single VM Monitoring
# Based on Prometheus 3.x best practices

global:
  # Scrape interval: 15s is a good balance for most metrics
  scrape_interval: 15s
  # Evaluation interval for alerting rules
  evaluation_interval: 15s
  # Scrape timeout should be less than scrape_interval
  scrape_timeout: 10s
  # External labels for federation and remote write scenarios
  external_labels:
    environment: production
    instance: agape-vm

# Alertmanager configuration (prepared for future use)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - alertmanager:9093

# Rule files for alerts and recording rules
# Recording rules can precompute expensive queries
rule_files:
  - /etc/prometheus/rules/*.yml

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    # Prometheus metrics path defaults to /metrics
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          component: prometheus
          service: monitoring

  # Node Exporter - System metrics (CPU, memory, disk, network)
  - job_name: node
    static_configs:
      - targets: ["127.0.0.1:9100"]
        labels:
          component: node-exporter
          service: system
    # Longer timeout for node_exporter as it can take time on busy systems
    scrape_timeout: 10s
    # Relabel to extract instance from target
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: "(.*):[0-9]+"
        replacement: "${1}"

  # cAdvisor - Container metrics (Docker containers)
  - job_name: cadvisor
    static_configs:
      - targets: ["127.0.0.1:8080"]
        labels:
          component: cadvisor
          service: containers
    # cAdvisor can be slow on systems with many containers
    scrape_timeout: 10s
    # Metric relabeling to reduce cardinality
    metric_relabel_configs:
      # Drop high-cardinality container metrics not needed
      - source_labels: [__name__]
        regex: "container_(network_tcp_usage_total|tasks_state|memory_failures_total)"
        action: drop
      # Drop metrics with blank container names (system containers)
      - source_labels: [name]
        regex: ""
        action: drop

  # Loki metrics endpoint for log aggregation monitoring
  - job_name: loki
    static_configs:
      - targets: ["127.0.0.1:3100"]
        labels:
          component: loki
          service: logging
    metrics_path: /metrics

  # Docker daemon metrics (if exposed)
  # Uncomment if you enable Docker metrics in daemon.json
  # - job_name: docker
  #   static_configs:
  #     - targets: ["127.0.0.1:9323"]
  #       labels:
  #         component: docker
  #         service: containers