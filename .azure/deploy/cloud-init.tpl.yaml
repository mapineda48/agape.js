#cloud-config
package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release

runcmd:
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io
  - usermod -aG docker azureuser

  # Formatear y montar disco en /mnt/persistent
  - mkfs.ext4 -F /dev/sdc
  - mkdir -p /mnt/persistent
  - mount /dev/sdc /mnt/persistent
  - echo "/dev/sdc /mnt/persistent ext4 defaults,nofail 0 2" >> /etc/fstab

  # Crear estructura de carpetas
  - mkdir -p /mnt/persistent/certs
  - mkdir -p /mnt/persistent/logs
  - mkdir -p /mnt/persistent/backups
